name: Build and publish PDF

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: MappingTheory.tex

      - name: Move PDF
        run: |
          mkdir -p pdf
          mv MappingTheory.pdf pdf/MappingTheory.pdf

      - name: Commit PDF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add pdf/MappingTheory.pdf
          git commit -m "update pdf" || echo "No changes"
          git push
